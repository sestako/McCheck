<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>McCheck Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="base-styles">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f7f8f9; /* Match light background */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-gray-900">
<!-- BEGIN: MainContent -->
<main class="flex-grow flex flex-col justify-center px-6 py-12 sm:px-12 w-full max-w-md mx-auto">
<!-- BEGIN: HeaderSection -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-800 rounded-2xl mb-4 shadow-lg">
<!-- Logo Placeholder -->
<svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-1">McCheck</h1>
<p class="text-sm font-medium text-gray-500 tracking-widest uppercase">Event Suite</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginForm -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input Group -->
<div>
<label class="block text-xs font-semibold text-gray-900 uppercase tracking-wider mb-2" for="email">Email Address</label>
<div class="relative rounded-xl shadow-sm">
<input class="block w-full bg-gray-100/50 border-0 text-gray-900 rounded-xl py-3.5 pl-4 pr-10 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-emerald-700 sm:text-sm sm:leading-6" id="email" name="email" placeholder="name@company.com" type="email"/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
<svg aria-hidden="true" class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
</div>
<!-- Password Input Group -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-xs font-semibold text-gray-900 uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-gray-900 uppercase tracking-wider hover:text-emerald-700" href="#">Forgot?</a>
</div>
<div class="relative rounded-xl shadow-sm">
<input class="block w-full bg-gray-100/50 border-0 text-gray-900 rounded-xl py-3.5 pl-4 pr-10 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-emerald-700 sm:text-sm sm:leading-6" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
<svg aria-hidden="true" class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
</div>
<!-- Sign In Button -->
<div>
<button class="flex w-full justify-center items-center rounded-xl bg-[#0f7652] px-3 py-3.5 text-sm font-semibold text-white shadow-lg shadow-emerald-900/20 hover:bg-[#0c6143] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-700 transition-colors" type="submit">
          Sign In
          <svg aria-hidden="true" class="ml-2 -mr-1 h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
<path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: SocialLogin -->
<div class="mt-8">
<div class="relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center text-sm font-medium leading-6">
<span class="bg-[#f7f8f9] px-4 text-xs text-gray-400 uppercase tracking-widest">Or continue with</span>
</div>
</div>
<div class="mt-6">
<button class="flex w-full items-center justify-center gap-3 rounded-xl bg-white px-3 py-3.5 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-200 hover:bg-gray-50 transition-colors" type="button">
<!-- Google Icon Placeholder -->
<div class="w-5 h-5 bg-gray-900 rounded flex items-center justify-center">
<span class="text-white text-[10px]">G</span>
</div>
          Google
        </button>
</div>
</div>
<!-- END: SocialLogin -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: Footer -->
<footer class="mt-auto pb-8">
<div class="flex justify-center space-x-6 text-xs text-gray-500 font-medium">
<a class="hover:text-gray-900 transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-gray-900 transition-colors" href="#">Terms of Service</a>
</div>
</footer>
<!-- END: Footer -->
</body></html>
